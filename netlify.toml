# Netlify configuration for Next.js 14 (FoodGo POS)
# Netlify auto-detects Next.js and uses OpenNext – no extra plugin needed.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"

# Required: Set in Netlify UI (Site settings → Environment variables)
# NEXT_PUBLIC_API_URL = your backend API URL (e.g. https://demo.webwideit.solutions/pos-aishwarya/public)
# Optional: NEXT_PUBLIC_TAX_RATE = 10
